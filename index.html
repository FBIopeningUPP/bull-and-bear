<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull & Bear - Advanced Trading Simulator</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar glass-panel">
            <div class="brand">Bull & Bear 📈</div>
            <div class="controls">
                <button id="btn-save" class="btn">Save</button>
                <button id="btn-pause" class="btn">pause</button>
                <button id="btn-speed-1" class="btn">1x</button>
                <button id="btn-speed-5" class="btn">5x</button>
            </div>
        </header>
        <div id="toast-container" class="toast-container"></div>
        <nav class="tab-bar">
            <div class="tab active" data-asset="TECH">Tech</div>
            <div class="tab" data-asset="GOLD">GOLD</div>
            <div class="tab" data-asset="CRYPTO">CRYPTO</div>
            <div class="tab" data-asset="PORTFOLIO">Portfolio & Equity Curve</div>
        </nav>

        <main class="workspace" id="desktop" style="position: relative; overflow: hidden; display: block;">

            <section class="chart-section">
                <div id="chart-view" class="canvas-container">
                    <canvas id="main-chart"></canvas>
                </div>

                <div id="portfolio-view" class="canvas-container hidden">
                    <canvas id="equity-chart"></canvas>
                </div>
            </section>
        </main>
        <div class="news-ticker-container">
            <div class="ticker-label">BREAKING NEWS</div>
            <div class="ticker-text-wrapper">
            <div id="news-text">Market is currently stable. Awaiting macroeconomic events...</div>
            </div>
        </div>

        <footer class="bottom-bar glass-panel">
            <div class="metric-box">
                <div class="metric-label">Total Equity</div>
                <div class="metric-value" id="stat-equity">$10,000.00</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">Available Cash</div>
                <div class="metric-value" id="stat-cash">$10,000.00</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">Unrealized P&L</div>
                <div class="metric-value" id="stat-unrealized">0</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">In-Game Day</div>
                <div class="metric-value" id="stat-day">$0.00</div>
            </div>
        </footer>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
